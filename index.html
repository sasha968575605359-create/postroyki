<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BCU TERMINAL - ULTIMATE SURK EDITION</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; color: #33ff33;
        }

        /* ПОЛНОЦЕННЫЙ МИР SUBSISTENCE (CSS ART) */
        .background-world {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #020502 0%, #0a1a0a 40%, #1a2a3a 50%, #c2b280 60%, #8b7d50 100%);
            z-index: -1;
        }
        
        .sea-layer {
            position: absolute; bottom: 40%; width: 100%; height: 80px;
            background: rgba(0, 150, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 100, 200, 0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .forest-silhouette {
            position: absolute; bottom: 50%; width: 100%; height: 150px;
            background: linear-gradient(0deg, #051005 0%, transparent 100%);
        }

        /* ЯЩИКИ НА ПЕСКЕ */
        .crate { position: absolute; border: 2px solid #111; border-radius: 2px; opacity: 0.7; }
        .blue-crate { bottom: 15%; left: 10%; width: 45px; height: 30px; background: #1e4d6d; box-shadow: 6px 6px 0 #0d2a3d; }
        .grey-crate { bottom: 22%; right: 12%; width: 35px; height: 25px; background: #555; box-shadow: 5px 5px 0 #222; }

        /* ЭФФЕКТЫ МОНИТОРА */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none; z-index: 100;
        }

        .scanline {
            width: 100%; height: 3px; background: rgba(51, 255, 51, 0.1);
            position: absolute; top: 0; z-index: 101;
            animation: moveScanline 6s linear infinite;
        }
        @keyframes moveScanline { from { top: 0; } to { top: 100%; } }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ТЕРМИНАЛА */
        .terminal-container {
            width: 580px; margin: 6vh auto;
            background: rgba(5, 20, 5, 0.92);
            border: 3px solid #1a5a1a;
            box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 20px rgba(0,255,0,0.1);
            padding: 30px; position: relative; z-index: 10;
            backdrop-filter: blur(4px);
        }

        .terminal-header {
            display: flex; justify-content: space-between;
            font-size: 12px; border-bottom: 2px solid #1a5a1a;
            padding-bottom: 10px; margin-bottom: 20px;
            color: #4eff4e;
        }

        .tier-indicator {
            text-align: center; color: #f1c40f; font-weight: bold;
            font-size: 16px; margin-bottom: 15px; letter-spacing: 2px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }

        h1 {
            text-align: center; font-size: 22px; letter-spacing: 6px;
            background: #002200; border: 1px solid #33ff33;
            padding: 12px; margin: 0; box-shadow: 0 0 15px rgba(51, 255, 51, 0.1);
        }

        /* СПИСОК ЗАДАЧ */
        .task-list { list-style: none; padding: 0; margin: 25px 0; }
        
        .task-item {
            background: rgba(0, 40, 0, 0.4);
            margin: 12px 0; padding: 18px;
            border: 1px solid #1a4a1a;
            display: flex; align-items: center;
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            border-color: #33ff33;
            background: rgba(0, 255, 0, 0.05);
            transform: translateX(5px);
        }

        input[type="checkbox"] {
            transform: scale(1.6); margin-right: 25px;
            accent-color: #33ff33; cursor: pointer;
        }

        .task-text { font-size: 15px; letter-spacing: 1px; }

        .completed-text {
            text-decoration: line-through;
            color: #004400;
            opacity: 0.6;
        }

        /* КНОПКА */
        .action-btn {
            width: 100%; padding: 20px;
            background: #0a2a0a; border: 2px solid #33ff33;
            color: #33ff33; font-family: inherit; font-size: 16px;
            font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #33ff33; color: #000;
            box-shadow: 0 0 25px #33ff33;
        }

        /* ЛОГ-ОКНО */
        .terminal-log {
            margin-top: 25px; height: 80px;
            background: #000; border: 1px solid #1a5a1a;
            padding: 12px; font-size: 11px; color: #1a8a1a;
            overflow-y: hidden; line-height: 1.5;
        }

        .status-bar {
            margin-top: 15px; text-align: center;
            font-size: 10px; color: #1a5a1a;
        }
    </style>
</head>
<body>

<div class="background-world">
    <div class="forest-silhouette"></div>
    <div class="sea-layer"></div>
    <div class="crate blue-crate"></div>
    <div class="crate grey-crate"></div>
</div>

<div class="crt-overlay"></div>
<div class="scanline"></div>

<audio id="sndClick" src="https://www.soundjay.com/buttons/button-16.mp3" preload="auto"></audio>
<audio id="sndError" src="https://www.soundjay.com/buttons/beep-10.mp3" preload="auto"></audio>
<audio id="sndLevel" src="https://www.soundjay.com/buttons/button-3.mp3" preload="auto"></audio>

<div class="terminal-container">
    <div class="terminal-header">
        <span>UNIT: SURK-OS-734</span>
        <span>ENERGY: <span id="valEnergy">14.2</span> Wh</span>
        <span>MASS: <span id="valMass">9.0</span></span>
    </div>

    <div class="tier-indicator" id="tierTitle">ЭТАП 1: ПОДГОТОВКА</div>
    <h1>BCU COMMANDER</h1>
    
    <ul id="taskList" class="task-list">
        </ul>
    
    <button class="action-btn" id="btnSync">СИНХРОНИЗИРОВАТЬ ДАННЫЕ</button>

    <div class="terminal-log" id="logBox">
        [SYSTEM]: Инициализация протокола выживания...<br>
        [INFO]: Ожидание выполнения задач Этапа 1.
    </div>
    
    <div class="status-bar">COASTAL SECTOR | STABLE CONNECTION | V 66.15</div>
</div>

<script>
    // ПОЛНЫЙ СПИСОК СЮЖЕТНЫХ ЗАДАНИЙ
    const storyData = [
        {
            title: "ЭТАП 1: ОСНОВАНИЕ",
            tasks: [
                "Найти 1 металлолом (Scrap Metal) на пляже",
                "Достроить первую коробку дома (4 стены)",
                "Установить BCU на внутреннюю стену"
            ]
        },
        {
            title: "ЭТАП 2: ПОВЫШЕНИЕ СТАВОК",
            tasks: [
                "Изменить уровень сложности на 'Нормал'",
                "Скрафтить костер внутри дома",
                "Найти 2 хлопка (Cotton) для ткани"
            ]
        },
        {
            title: "ЭТАП 3: ОХОТНИК И ЖЕРТВА",
            tasks: [
                "Скрафтить лук и 10 стрел",
                "Убить первого волка у побережья",
                "Добыть 5 порций водорослей (Келп)"
            ]
        },
        {
            title: "ЭТАП 4: ФОРТИФИКАЦИЯ",
            tasks: [
                "Построить лестницу и 2-й этаж",
                "Скрафтить верстак (Workbench)",
                "Найти первый ящик в лагере охотников"
            ]
        }
    ];

    let currentLevel = 0;
    const logBox = document.getElementById('logBox');

    function renderTasks() {
        const list = document.getElementById('taskList');
        const title = document.getElementById('tierTitle');
        const levelData = storyData[currentLevel];

        title.innerText = levelData.title;
        list.innerHTML = "";

        levelData.tasks.forEach(t => {
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <input type="checkbox" onchange="handleCheck(this)">
                <span class="task-text">${t}</span>
            `;
            list.appendChild(li);
        });
    }

    function handleCheck(el) {
        const span = el.nextElementSibling;
        if(el.checked) {
            span.classList.add('completed-text');
            document.getElementById('sndClick').play();
            addLog(`[OK]: Задача "${span.innerText.substring(0, 15)}..." выполнена.`);
        } else {
            span.classList.remove('completed-text');
        }
    }

    function addLog(msg) {
        logBox.innerHTML = msg + "<br>" + logBox.innerHTML.substring(0, 200);
    }

    document.getElementById('btnSync').onclick = () => {
        const total = document.querySelectorAll('input[type="checkbox"]').length;
        const checked = document.querySelectorAll('input:checked').length;

        if(checked === total) {
            if(currentLevel < storyData.length - 1) {
                currentLevel++;
                document.getElementById('sndLevel').play();
                addLog(`<span style="color: #f1c40f">[SYSTEM]: Этап завершен. Загрузка новых протоколов...</span>`);
                renderTasks();
            } else {
                addLog(`<span style="color: #33ff33">[FINAL]: ТЫ СТАЛ КОРОЛЕМ ПЛЯЖА. СУРОК ГОРДИТСЯ ТОБОЙ!</span>`);
                alert("ВСЕ ЗАДАНИЯ ВЫПОЛНЕНЫ!");
            }
        } else {
            document.getElementById('sndError').play();
            addLog(`<span style="color: #ff3333">[ERROR]: Не все задачи этапа выполнены!</span>`);
        }
    };

    // Обновление статов для атмосферы
    setInterval(() => {
        document.getElementById('valEnergy').innerText = (14.2 + Math.random()).toFixed(1);
        document.getElementById('valMass').innerText = (9.0 + Math.random()*0.5).toFixed(1);
    }, 3000);

    // Инициализация
    renderTasks();
</script>

</body>
</html>
